<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KDT 센서 관제 대시보드</title>
    <style>
      /* CSS 변수 — 상태 색상 시스템 */
      :root {
        --color-normal: #22c55e;
        --color-warning: #f59e0b;
        --color-alarm: #ef4444;
        --color-bg: #0f172a;
        --color-card: #1e293b;
        --color-text: #e2e8f0;
        --color-muted: #94a3b8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--color-bg);
        color: var(--color-text);
        font-family: "Segoe UI", sans-serif;
        display: flex;
        height: 100vh;
      }

      /* 사이드바 */
      .sidebar {
        width: 200px;
        background: var(--color-card);
        padding: 20px 16px;
        border-right: 1px solid #334155;
        flex-shrink: 0;
      }

      .sidebar h2 {
        font-size: 14px;
        color: var(--color-muted);
        margin-bottom: 16px;
        letter-spacing: 0.05em;
      }

      .nav-item {
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        margin-bottom: 4px;
      }

      .nav-item.active {
        background: #334155;
        color: white;
      }

      /* 메인 영역 */
      .main {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
      }

      .main h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 20px;
      }

      /* 센서 카드 그리드 */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }

      /* 센서 카드 */
      .sensor-card {
        background: var(--color-card);
        border-radius: 10px;
        padding: 16px;
        border-left: 4px solid var(--color-normal);
      }

      .sensor-card.warning {
        border-left-color: var(--color-warning);
      }

      .sensor-card.alarm {
        border-left-color: var(--color-alarm);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .card-name {
        font-size: 13px;
        color: var(--color-muted);
      }

      /* 상태 배지 */
      .badge {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .badge.normal {
        background: rgba(34, 197, 94, 0.15);
        color: var(--color-normal);
      }

      .badge.warning {
        background: rgba(245, 158, 11, 0.15);
        color: var(--color-warning);
      }

      .badge.alarm {
        background: rgba(239, 68, 68, 0.15);
        color: var(--color-alarm);
      }

      /* 센서 값 */
      .card-value {
        font-size: 32px;
        font-weight: 700;
        font-family: "Courier New", monospace;
        margin-bottom: 4px;
      }

      .card-unit {
        font-size: 13px;
        color: var(--color-muted);
        margin-left: 4px;
      }

      .card-device {
        font-size: 11px;
        color: var(--color-muted);
        margin-top: 8px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <!-- 사이드바 -->
    <aside class="sidebar">
      <h2>KDT 트윈</h2>
      <div class="nav-item active">대시보드</div>
      <div class="nav-item">알림</div>
      <div class="nav-item">설정</div>
    </aside>

    <!-- 메인 영역 -->
    <main class="main">
      <h1>Line-01 실시간 현황</h1>

      <!-- 센서 카드 그리드 -->
      <div class="card-grid" id="cardGrid">
        <!-- JavaScript가 여기에 카드를 추가합니다 -->
      </div>
    </main>

    <script>
      // Mock 센서 데이터
      const sensors = [
        {
          id: "D001",
          name: "Press-01 온도",
          value: 23.4,
          unit: "°C",
          status: "normal",
        },
        {
          id: "D002",
          name: "Motor-03 진동",
          value: 7.2,
          unit: "mm/s",
          status: "warning",
        },
        {
          id: "D003",
          name: "Pump-02 압력",
          value: 112.6,
          unit: "kPa",
          status: "normal",
        },
        {
          id: "D004",
          name: "Conveyor-01 전류",
          value: 18.9,
          unit: "A",
          status: "alarm",
        },
      ];

      // 카드 HTML 생성 함수
      function createCard(sensor) {
        return `
          <div class="sensor-card ${sensor.status}">
            <div class="card-header">
              <span class="card-name">${sensor.name}</span>
              <span class="badge ${sensor.status}">${sensor.status}</span>
            </div>
            <div>
              <span class="card-value" id="value-${sensor.id}">${sensor.value}</span>
              <span class="card-unit">${sensor.unit}</span>
            </div>
            <div class="card-device">${sensor.id}</div>
          </div>
        `;
      }

      // 카드 그리드에 렌더링
      const grid = document.getElementById("cardGrid");
      sensors.forEach((sensor) => {
        grid.innerHTML += createCard(sensor);
      });

      // 1초마다 값 업데이트 (Mock 실시간)
      setInterval(() => {
        sensors.forEach((sensor) => {
          const el = document.getElementById("value-" + sensor.id);
          if (el) {
            const change = (Math.random() - 0.5) * 2;
            sensor.value = Math.round((sensor.value + change) * 10) / 10;
            el.textContent = sensor.value;
          }
        });
      }, 1000);
    </script>
  </body>
</html>
